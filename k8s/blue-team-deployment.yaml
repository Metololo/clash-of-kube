apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-soldiers
spec:
  replicas: 4
  selector:
    matchLabels:
      app: soldier
      team: blue
  template:
    metadata:
      labels:
        app: soldier
        team: blue
    spec:
      containers:
      - name: soldier
        image: metooo/soldier:latest
        imagePullPolicy: IfNotPresent 
        env:
        - name: SOLDIER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ENEMY_SERVICE
          value: "red-team:50051"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: TEAM
          value: blue
        - name: HEALTH
          value: "150"
        - name: ATTACK_POWER
          value: "40"
        - name: PORT
          value: "50051"
        ports:
         - containerPort: 50051
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: blue-team
spec:
  selector:
    app: soldier
    team: blue
  ports:
    - port: 50051
      targetPort: 50051