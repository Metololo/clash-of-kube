apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-soldiers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soldier
      team: blue
  template:
    metadata:
      labels:
        app: soldier
        team: blue
    spec:
      containers:
      - name: soldier
        image: metooo/soldier:v1
        env:
        - name: SOLDIER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: TEAM
          value: blue
        - name: HEALTH
          value: "100"
        - name: ATTACK_POWER
          value: "30"
        - name: PORT
          value: "8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: blue-team
spec:
  selector:
    app: soldier
    team: blue
  ports:
    - port: 80
      targetPort: 8080