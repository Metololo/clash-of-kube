apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-soldiers
spec:
  replicas: 6
  selector:
    matchLabels:
      app: soldier
      team: blue
  template:
    metadata:
      labels:
        app: soldier
        team: blue
    spec:
      containers:
      - name: soldier
        image: metooo/soldier:v3.1
        env:
        - name: SOLDIER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ENEMY_URL
          value: "http://red-team/takeDamage"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: TEAM
          value: blue
        - name: HEALTH
          value: "100"
        - name: ATTACK_POWER
          value: "40"
        - name: PORT
          value: "8080"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: blue-team
spec:
  selector:
    app: soldier
    team: blue
  ports:
    - port: 80
      targetPort: 8080